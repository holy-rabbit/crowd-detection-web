version: '3.8'

services:
  crowd-detection:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./static/uploads:/app/static/uploads
      - ./static/output:/app/static/output
    environment:
      - FLASK_ENV=development
      - FFMPEG_PATH=/usr/bin/ffmpeg
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s